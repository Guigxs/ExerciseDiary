services:
  exdiary:
    build: .
    image: exercisediary:local
    restart: unless-stopped
    ports:
      - "8851:8851"
    volumes:
      - exdiary-data:/data/ExerciseDiary
    environment:
      TZ: "Europe/Paris"        # set your server timezone
      HOST: "0.0.0.0"
      PORT: "8851"
      THEME: "grass"            # bootswatch theme
      COLOR: "light"            # light | dark
      HEATCOLOR: "#03a70c"      # heatmap colour
      DATEFORMAT: "DD/MM/YYYY"  # DD/MM/YYYY | MM/DD/YYYY | YYYY-MM-DD
      PAGESTEP: "10"            # rows per page on stats/weight
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8851/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  exdiary-data: