{{ define "index.html" }}
</head>
<script src="/fs/public/js/heatmap.js"></script>
<script src="/fs/public/js/index.js"></script>
<link rel="stylesheet" type="text/css" href="/fs/public/css/index.css" />
<body>
<div class="container-lg mt-4">
  <div class="row">
    <div class="col mb-4">
      <div class="card border-primary">
        <div class="card-body">
          <div class="horiz-scroll">
              <div style="height: 100px; width: 770px;">
                  <canvas id="matrix-chart" style="height: 100%; width: 100%;"></canvas>
              </div>
          </div>
        </div>
      </div>
    </div>
  </div>
    <div class="row">
        <div class="col-md mb-4">
            <div class="accordion">
                {{ range $gr, $grID := .GroupMap }}
                <div class="accordion-item border-primary">
                    <h2 class="accordion-header">
                      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#{{ $grID }}" aria-expanded="false" aria-controls="{{ $grID }}">
                        {{ $gr }}
                      </button>
                    </h2>
                    <div id="{{ $grID }}" class="accordion-collapse collapse">
                      <div class="accordion-body py-2">
                        <div class="d-flex justify-content-end mb-1">
                          <button class="btn btn-sm icon-btn px-2" style="font-size:0.85rem;" title="Add all to workout" onclick='addAllGroup({{ $.ExData.Exs }}, "{{ $gr }}")'>
                            <i class="bi bi-chevron-double-right"></i> Add all
                          </button>
                        </div>
                        {{ range $.ExData.Exs }}
                        {{ if eq .Group $gr }}
                        <div class="d-flex align-items-center gap-1 py-1">
                            <a href="/exercise/?id={{ .ID }}"><button class="btn icon-btn" title="Edit">
                              <i class="bi bi-pencil-square"></i>
                            </button></a>
                            <!-- Button trigger modal -->
                            <button class="btn icon-btn" title="Show details" data-bs-toggle="modal" data-bs-target="#modal{{ .ID }}">
                              <i class="bi bi-window-desktop"></i>
                            </button>
<!-- Modal -->
<div class="modal" id="modal{{ .ID }}">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ .Name }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
          <span aria-hidden="true"></span>
        </button>
      </div>
      <div class="modal-body">
        <div class="col">
          <p>Description: {{ .Descr }}</p>
          <p>Default: {{ .Sets }} × {{ .Reps }} @ {{ .Weight }}</p>
        </div>
        <div class="col">
          <img src="{{ .Image }}" style="max-width: 100%;max-height: 100%;" alt="Exercise Image"></img>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- End Modal -->
                            <button class="btn ex-name-btn flex-grow-1" onclick='addExercise("{{ .Name }}", "{{ .Weight }}", "{{ .Reps }}", {{ .Sets }})' title="{{ .Sets }}× {{ .Reps }} @ {{ .Weight }}">{{ .Name }}</button>
                            <button class="btn icon-btn" onclick='addExercise("{{ .Name }}", "{{ .Weight }}", "{{ .Reps }}", {{ .Sets }})' title="Add">
                                <i class="bi bi-plus-square"></i>
                            </button>
                        </div>
                        {{ end }}
                        {{ end }}
                      </div>
                    </div>
                  </div>
                {{ end }}              
              </div>
        </div>
        <div class="col-md mb-4">
            <div class="card border-primary">
                <div class="card-header">
                  <div class="row align-items-center">
                    <div class="col-auto">
                      <button onclick='goToToday({{ .ExData.Sets }})' class="btn del-set-button" title="Go to today">
                        <i class="bi bi-calendar-check"></i>
                      </button>
                    </div>
                    <div class="col hstack">
                      <button onclick='moveDayLeftRight(-1, {{ .ExData.Sets }})' class="btn del-set-button">
                        <i class="bi bi-arrow-left-square"></i>
                      </button>
                      <input type="date" class="m-auto form-control" onchange='setFormDate({{ .ExData.Sets }})' id="realDate" style="width: 70%;">
                      <button onclick='moveDayLeftRight(+1, {{ .ExData.Sets }})' class="btn del-set-button">
                        <i class="bi bi-arrow-right-square"></i>
                      </button>
                    </div>
                  </div>
                </div>
                <div class="card-body px-2 py-2">
                <form action="/set/" method="post" name="sets">
                  <input name="date" type="hidden" id="formDate">
                  <div id="todayEx"></div>
                  <button type="submit" class="btn btn-primary w-100 mt-2">Save</button>
                </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
  setFormDate({{ .ExData.Sets }});
  makeChart({{ .HeatMap }}, {{ .Config.HeatColor }}, {{ .ExData.Sets }});
</script>
{{ template "footer.html" }}
{{ end }}
