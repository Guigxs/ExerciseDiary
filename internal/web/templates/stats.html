{{ define "stats.html" }}
</head>
<script src="/fs/public/js/stats.js"></script>
<script src="/fs/public/js/weight-chart.js"></script>
<link rel="stylesheet" type="text/css" href="/fs/public/css/index.css" />
<body>
    <div class="container-lg mt-4">

        <!-- Exercise selector + export/import — spans full width -->
        <div class="card border-primary mb-4">
            <div class="card-body py-2">
                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <div class="flex-grow-1" style="min-width: 160px;">
                        <select class="form-select" id="ex-value" onchange='sOffset=0; setStatsPage({{ .ExData.Sets }}, {{ .Config.HeatColor }}, 0, {{ .Config.PageStep }}, "{{ .Config.DateFormat }}");'>
                            {{ range $gr := .GroupMap }}
                            <option value="{{ $gr }}">{{ $gr }}</option>
                            {{ end }}
                        </select>
                    </div>
                    <div class="dropdown">
                        <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-download"></i> Export
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/export/">All exercises &amp; sets</a></li>
                            <li><a class="dropdown-item" href="#" onclick="window.location='/export/?name='+encodeURIComponent(document.getElementById('ex-value').value); return false;"><i class="bi bi-funnel"></i> This exercise only</a></li>
                        </ul>
                    </div>
                    <button class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#importModal" title="Import from JSON">
                        <i class="bi bi-upload"></i> Import
                    </button>
                </div>
            </div>
        </div>

        <!-- Import modal -->
        <div class="modal fade" id="importModal" tabindex="-1" aria-labelledby="importModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="importModalLabel"><i class="bi bi-upload"></i> Import exercises &amp; sets</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form action="/import/" method="post" enctype="multipart/form-data">
                        <div class="modal-body">
                            <p class="text-muted small mb-3">Upload a <code>.json</code> file previously exported from Exercise Diary. Existing records are kept; only new entries are added.</p>
                            <input type="file" name="importfile" accept=".json" class="form-control" required>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-upload"></i> Import</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card border-primary">
                    <div class="card-header">History</div>
                    <div class="card-body">
                        <table class="table table-borderless">
                            <thead>
                                <th class="col-1"></th>
                                <th class="col-4">Date</th>
                                <th class="col-3">Reps</th>
                                <th class="col-3">Weight</th>
                            </thead>
                            <tbody id="stats-table">
                            </tbody>
                        </table>
                        <div class="gap-3 hstack">
                            <button onclick='setStatsPage({{ .ExData.Sets }}, {{ .Config.HeatColor }}, 1, {{ .Config.PageStep }}, "{{ .Config.DateFormat }}");' class="m-auto btn del-set-button"><i class="bi bi-arrow-left-square"></i></button>
                            <button onclick='setStatsPage({{ .ExData.Sets }}, {{ .Config.HeatColor }}, -1, {{ .Config.PageStep }}, "{{ .Config.DateFormat }}");' class="m-auto btn del-set-button"><i class="bi bi-arrow-right-square"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card border-primary mb-4">
                    <div class="card-header">Reps</div>
                    <div class="card-body">
                        <canvas id="stats-reps" style="max-height: 200px;"></canvas>
                    </div>
                </div>
                <div class="card border-primary mb-4">
                    <div class="card-header">Weight</div>
                    <div class="card-body">
                        <canvas id="stats-weight" style="max-height: 200px;"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
        
<script>
   setStatsPage({{ .ExData.Sets }}, {{ .Config.HeatColor }}, 0, {{ .Config.PageStep }}, "{{ .Config.DateFormat }}");
</script>

{{ template "footer.html" }}
{{ end }}
